<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH Terminal | Meduseld</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        .navbar-custom {
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid #c9a227;
            padding: 10px 20px;
            flex-shrink: 0;
        }
        
        .terminal-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
        
        @media (max-width: 768px) {
            .navbar-custom {
                padding: 8px 12px;
            }
            
            .navbar-custom .d-flex {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .navbar-custom .text-white {
                font-size: 0.9rem;
                width: 100%;
                margin-bottom: 4px;
            }
            
            .navbar-custom > .d-flex > div:last-child {
                width: 100%;
                display: flex;
                justify-content: flex-end;
                gap: 8px;
            }
            
            .navbar-custom .btn-sm {
                font-size: 0.8rem;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar-custom">
        <div class="d-flex justify-content-between align-items-center">
            <div class="text-white">
                <strong>SSH Terminal</strong> | Meduseld Server
            </div>
            <div>
                <a href="https://panel.meduseld.io" class="btn btn-sm btn-warning me-2">Server Panel</a>
                <a href="https://menu.meduseld.io" class="btn btn-sm btn-warning">Back to Menu</a>
            </div>
        </div>
    </div>
    
    <iframe src="https://terminal.meduseld.io" class="terminal-frame" id="terminal"></iframe>
</body>
</html>
